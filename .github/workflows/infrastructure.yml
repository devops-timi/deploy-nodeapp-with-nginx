name: Deploy Containerized App with Nginx
on:
  push:
    branches:
      - main  

jobs:
  configure:
    name: Configure EC2 with Ansible
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ansible 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: bash ansible.sh  

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          # This command successfully creates ~/.ssh/us-connect.pem
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/us-connect.pem
          chmod 600 ~/.ssh/us-connect.pem

      - name: Run Ansible Playbook
        # We need to disable host key checking in the workflow env for this to connect easily
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          # This command now works because the inventory file path matches the created key path
          ansible-playbook -i inventory.ini setup-server.yml    

  build-and-deploy:
    name: Build and Deploy Application
    runs-on: ubuntu-latest
    needs: configure

    defaults:
      run:
        working-directory: node-ec2-app

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Build image and Push to ECR
        run: |
          aws sts get-caller-identity
          docker ps

          aws ecr get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin 596387592424.dkr.ecr.us-east-1.amazonaws.com

          docker build -t 596387592424.dkr.ecr.us-east-1.amazonaws.com/node-nginx-app:latest .

          docker images

          docker push 596387592424.dkr.ecr.us-east-1.amazonaws.com/node-nginx-app:latest


      - name: Deploy Container via SSH
        uses: appleboy/ssh-action@v0.1.7 #Third-party GitHub Action designed to easily run SSH commands on a remote server within your automated workflow
        with:
          host: 98.81.204.204 # Replace with your actual IP or a variable
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          target: "/home/ubuntu/deploy-nodeapp-with-nginx"
          script: |
            cd /home/ubuntu/deploy-nodeapp-with-nginx # Navigate to home directory on EC2
            docker stop node-app || true
            docker rm node-app || true
            # Pull the image remotely on the EC2 instance
            aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin 596387592424.dkr.ecr.us-east-1.amazonaws.com
            docker pull 596387592424.dkr.ecr.us-east-1.amazonaws.com/node-nginx-app:latest
            docker run -d -p 3000:3000 --name node-app --restart unless-stopped 596387592424.dkr.ecr.us-east-1.amazonaws.com/node-nginx-app:latest
            sleep 5
            docker ps -a # Verify remotely
            echo "✅ Deployment complete!"
