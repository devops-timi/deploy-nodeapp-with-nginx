name: Infrastructure-Provisioning
on:
  push:
    branches:
      - main  
  
env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.6.0

jobs:
  provision:
    name: Provision EC2 and ECR with Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node-ec2-app/terraform # Path to TF files

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Get EC2 IP and ECR URL
        id: vars
        working-directory: ./node-ec2-app/terraform
        run: |
          terraform init
          terraform plan
          terraform apply -auto-approve
          echo "EC2_IP=$(terraform output -raw instance_public_ip)" >> $GITHUB_OUTPUT
          echo "ECR_URL=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT
      
      - name: Wait for EC2 User Data to Complete
        run: |
          echo "Waiting for EC2 user data to complete..."
          echo "This takes about 3-5 minutes..."
          sleep 180  # Wait 3 minutes for user data

  build-and-deploy:
    name: Build and Deploy Application
    runs-on: ubuntu-latest
    needs: provision

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        working-directory: ./node-ec2-app
        run: |
          docker build -t ${{ needs.provision.outputs.ecr_url }}:latest .
          docker push ${{ needs.provision.outputs.ecr_url }}:latest

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/deploy.pem \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ needs.provision.outputs.ec2_ip }} << 'ENDSSH'
          
          # Login to ECR
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ needs.provision.outputs.ecr_url }}
          
          # Pull latest image
          docker pull ${{ needs.provision.outputs.ecr_url }}:latest
          
          # Stop old container
          docker stop node-app || true
          docker rm node-app || true

          # Run new container
          docker run -d \
            --name node-app \
            --restart unless-stopped \
            -p 80:3000 \
            ${{ needs.provision.outputs.ecr_url }}:latest
          
          # Verify
          sleep 5
          docker ps | grep node-app
          
          echo "✅ Deployment complete!"
          ENDSSH